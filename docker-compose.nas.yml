# docker-compose.nas.yml — Soundcork deployment for NAS / always-on hosts
#
# Usage:
#   1. Copy this file, nginx-ETag.conf and .env.example to your NAS:
#        scp docker-compose.nas.yml nginx-ETag.conf .env.example user@nas:/path/to/soundcork/
#   2. Create a .env file from the example and set BASE_URL to your NAS IP:
#        cp .env.example .env
#        # edit .env: BASE_URL=http://<NAS-IP>:<port>
#   3. Create data/logs directories and optionally copy your existing DB:
#        mkdir -p data logs
#   4. Start:
#        docker compose -f docker-compose.nas.yml up -d
#
# The soundcork container uses host networking so the Bose SoundTouch device
# can reach it directly. nginx-ETag provides the ETag header required by the
# SoundTouch firmware for media/artwork caching.
#
# The pre-built image is published at ghcr.io/mmetzler-fes/soundcork:main.
# To use the upstream image instead, replace the image tag with:
#   ghcr.io/deborahgu/soundcork:main  (if published there)

services:
  soundcork:
    image: ghcr.io/mmetzler-fes/soundcork:main
    network_mode: host
    environment:
      # BASE_URL must match the IP/port that the SoundTouch device can reach
      - base_url=${BASE_URL}
      - data_dir=/soundcork/data
      - SOUNDCORK_MODE=local
      - SOUNDCORK_LOG_DIR=/soundcork/logs/traffic
    volumes:
      # Persist user data (presets, device info, etc.) across container restarts
      - ./data:/soundcork/data
      # Traffic logs (optional, remove if not needed)
      - ./logs:/soundcork/logs
    restart: unless-stopped
  nginx-etag:
    image: nginx
    container_name: nginx-ETag
    network_mode: host
    volumes:
      - ./nginx-ETag.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
