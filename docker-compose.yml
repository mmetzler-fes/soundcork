services:
  soundcork:
    image: ghcr.io/mmetzler-fes/soundcork:main
    # host network mode is required so the SoundTouch speaker can reach this
    # server directly by LAN IP — no port-publishing needed.
    network_mode: host
    environment:
      # BASE_URL must be reachable by the speaker (use the server/NAS LAN IP).
      # Use port 8001 (nginx-ETag proxy, recommended) or 8000 (direct).
      # Set in a .env file next to docker-compose.yml:
      #   BASE_URL=http://192.168.1.100:8001
      - base_url=${BASE_URL}
      - data_dir=/soundcork/data
      - SOUNDCORK_LOG_DIR=/soundcork/logs/traffic
      # Optional: Music Assistant integration
      # BASE_URL of the Music Assistant web UI, e.g. http://192.168.1.100:8095
      - music_assistant_url=${MUSIC_ASSISTANT_URL:-}
      # Direct HTTP audio stream exposed by Music Assistant (e.g. via Snapcast)
      # e.g. http://192.168.1.100:1704/stream
      - music_assistant_stream_url=${MUSIC_ASSISTANT_STREAM_URL:-}
    volumes:
      - ./data:/soundcork/data
      - ./logs:/soundcork/logs
    restart: unless-stopped

  nginx-etag: # see https://github.com/deborahgu/soundcork/issues/129
    image: nginx
    container_name: nginx-ETag
    # must also use host mode since soundcork does
    network_mode: host
    volumes:
      - ./nginx-ETag.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  music-assistant:
    image: ghcr.io/music-assistant/server:latest
    container_name: music-assistant
    # host network gives MA access to mDNS/Airplay discovery on the LAN
    network_mode: host
    environment:
      - LOG_LEVEL=info
    volumes:
      - ./music-assistant-data:/data
      # Local music library — put MP3/FLAC/etc. files here on the host.
      # In MA: Settings → Providers → Local Files → path = /music
      - ./music:/music
    restart: unless-stopped
    # Remove or comment out this service if you do not need Music Assistant.

# Setup (one time):
#   cp .env.example .env
#   edit .env — set BASE_URL to your server/NAS LAN IP
#   ./setup-speaker.sh        # configures the speaker to use this server
#
# Run:
#   docker compose up -d
#   docker compose up -d soundcork nginx-etag   # without Music Assistant
#   docker compose logs -f
#   docker compose stop
#
# Music Assistant UI: http://<host>:8095 after first start.
# Set MUSIC_ASSISTANT_URL and MUSIC_ASSISTANT_STREAM_URL in .env to enable
# the "Play on Speaker" button in the soundcork dashboard.
