services:
  soundcork:
    image: ghcr.io/mmetzler-fes/soundcork:main
    # host network mode is required so the speaker can reach this server by LAN IP
    network_mode: host
    environment:
      # BASE_URL must be reachable by the speaker (use the NAS/server LAN IP).
      # Set this in a .env file next to docker-compose.yml:
      #   BASE_URL=http://192.168.1.100:8001
      # Use port 8001 (nginx-ETag proxy) or 8000 (direct, no ETag fix).
      - base_url=${BASE_URL}
      - data_dir=/soundcork/data
      - SOUNDCORK_MODE=local
      - SOUNDCORK_LOG_DIR=/soundcork/logs/traffic
      # Optional: Music Assistant integration
      # Point to the Music Assistant web UI and stream URL after setting up MA.
      - music_assistant_url=${MUSIC_ASSISTANT_URL:-}
      - music_assistant_stream_url=${MUSIC_ASSISTANT_STREAM_URL:-}
    volumes:
      - ./data:/soundcork/data
      - ./logs:/soundcork/logs
    restart: unless-stopped
  nginx-etag: # see https://github.com/deborahgu/soundcork/issues/129
    image: nginx
    container_name: nginx-ETag
    # since soundcork is in host mode so is nginx
    network_mode: host
    volumes:
      - ./nginx-ETag.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
  music-assistant:
    image: ghcr.io/music-assistant/server:latest
    container_name: music-assistant
    # host network gives MA access to mDNS/Airplay discovery on the LAN
    network_mode: host
    environment:
      - LOG_LEVEL=info
    volumes:
      - ./music-assistant-data:/data
    restart: unless-stopped

# Setup (one time):
#   cp .env.example .env
#   edit .env — set BASE_URL to your server's LAN IP
#   ./setup-speaker.sh        # configures the speaker to use this server
#
# Run:
#   docker compose up -d
#   docker compose logs -f
#   docker compose stop
#
# Music Assistant is available at http://<host>:8095 after first start.
# To connect SoundTouch: configure MUSIC_ASSISTANT_URL and
# MUSIC_ASSISTANT_STREAM_URL in your .env file once MA is set up.
